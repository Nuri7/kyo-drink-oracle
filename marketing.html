
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Video</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap");

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #111; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
            font-family: "Inter", sans-serif;
        }

        #phone-container {
            width: 540px;
            height: 960px;
            position: relative;
            background: #FDFBF7;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* ---------------- Images ---------------- */
        .slide {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            z-index: 1;
        }
        .slide img {
            width: 100%; height: 100%; object-fit: cover;
            transform: scale(1.1);
        }
        .slide.active { opacity: 1; }
        .slide.active img {
            animation: zoomPan 3s linear infinite alternate;
        }
        @keyframes zoomPan {
            0% { transform: scale(1.05) translate(0, 0); }
            100% { transform: scale(1.15) translate(-2%, 2%); }
        }

        /* ---------------- Typography ---------------- */
        .overlay-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            pointer-events: none;
        }

        .kinetic-text {
            font-size: 4rem;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            line-height: 1.1;
            text-shadow: 0 5px 20px rgba(0,0,0,0.8);
            opacity: 0;
            transform: scale(0.9) translateY(20px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: absolute;
            width: 90%;
        }

        .kinetic-text.show {
            opacity: 1;
            transform: scale(1) translateY(0);
        }
        .kinetic-text.hide {
            opacity: 0;
            transform: scale(1.1) translateY(-20px);
        }

        .highlight { color: #8A9A5B; }
        .bg-dimmer {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.4); z-index: 5;
        }

        #progress-bar {
            position: absolute; bottom: 0; left: 0; height: 10px; background: #8A9A5B; z-index: 20;
            width: 0%; transition: width 0.1s linear;
        }
        
        .logo-stamp {
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            color: white; font-weight: 900; font-size: 1.5rem; letter-spacing: 5px; z-index: 20;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

        <div class="overlay-layer">
            <div id="text-1" class="kinetic-text show">Not sure<br>what to<br>drink? 🧐</div>
            <div id="text-2" class="kinetic-text">Consult the<br><span class="highlight">KYŌ Oracle</span> ✨</div>
            <div id="text-3" class="kinetic-text">33 Unique<br>Matcha &<br>Hojicha<br>Profiles 🍵</div>
            <div id="text-4" class="kinetic-text">Find Your<br>Perfect<br>Match 🏆</div>
            <div id="text-5" class="kinetic-text" style="font-size: 2.5rem;">Visit us at<br><span class="highlight" style="font-size: 2.2rem; line-height: 1.2; display: inline-block; margin: 1rem 0;">Kinkerstraat 94,<br>Amsterdam</span><br><span style="font-size: 1.5rem; text-transform:none;">to try our drinks!</span></div>
        </div>
    </div>

    <script>
        const slides = document.querySelectorAll(".slide");
        let currentSlide = 0;
        
        // Majestic cinematic image rotation
        setInterval(() => {
            slides[currentSlide].classList.remove("active");
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add("active");
        }, 1500); // Slower 1.5s majestic pan duration

        // Text Phases
        const texts = [
            document.getElementById("text-1"),
            document.getElementById("text-2"),
            document.getElementById("text-3"),
            document.getElementById("text-4"),
            document.getElementById("text-5"),
        ];
        
        const phases = [
            { textIdx: 0, duration: 2500 },
            { textIdx: 1, duration: 2500 },
            { textIdx: 2, duration: 3500 }, // long for fast flash showcase
            { textIdx: 3, duration: 2500 },
            { textIdx: 4, duration: 4000 }
        ];

        let currentPhase = 0;
        
        function runPhases() {
            if (currentPhase >= phases.length) currentPhase = 0; // loop
            
            // Hide all
            texts.forEach(t => { t.classList.remove("show"); t.classList.remove("hide"); });
            
            // Show current
            const t = texts[phases[currentPhase].textIdx];
            t.classList.add("show");
            
            setTimeout(() => {
                t.classList.remove("show");
                t.classList.add("hide");
                currentPhase++;
                runPhases();
            }, phases[currentPhase].duration - 300); // -300 to let hide animation play
        }
        
        setTimeout(runPhases, 2500); // Start after first text has lived 2.5s

        // Progress bar simulation (15s loop)
        const progress = document.getElementById("progress-bar");
        let start = Date.now();
        setInterval(() => {
            let elapsed = Date.now() - start;
            if (elapsed > 15000) { start = Date.now(); elapsed = 0; }
            progress.style.width = (elapsed / 15000 * 100) + "%";
        }, 50);

    </script>
</body>
</html>
