<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYŌ KLUB - Analytics Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>
    <div class="bg-shape bg-shape-3" style="opacity: 0.1;"></div>

    <div class="admin-container">
        <div class="admin-header">
            <h1 class="title">Oracle Analytics</h1>
            <a href="../index.html" class="btn btn-outline" style="text-decoration:none;">Exit to Oracle</a>
        </div>

        <!-- Lock Screen -->
        <div id="lock-screen" class="admin-locked-screen glass-panel">
            <h2 style="font-size:1.6rem; color:var(--text-main)">Authorized Personnel Only</h2>
            <p style="margin-top:0.5rem;color:var(--text-light)">Enter your 4-digit PIN</p>
            <input type="password" id="pin-input" class="pin-input" maxlength="4" placeholder="••••">
            <button id="unlock-btn" class="btn btn-primary">Unlock Dashboard</button>
            <p id="error-msg" style="color:#c0392b;margin-top:1rem;display:none;font-weight:bold;">Incorrect PIN</p>
        </div>

        <!-- Dashboard Setup / Embed -->
        <div id="dashboard-screen" class="hidden">
            <!-- This is where the user will paste their Iframe -->
            <div class="dashboard-frame-container" id="iframe-wrapper">
                
                <iframe width="100%" height="400" frameborder="0" allowfullscreen src="https://eu.posthog.com/embedded/RJWEEC0eX8RwKK6y2s3OPOWknkrWFw" key="1" sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-top-navigation allow-modals"></iframe>
                
            </div>
        </div>
    </div>

    <script>
        // Simple client side string protection
        const EXPECTED_PIN = "3340"; // PIN corresponds to address 'Kinkerstraat 334'? Added '0'. Just a simple gate!
        
        const pinInput = document.getElementById('pin-input');
        const unlockBtn = document.getElementById('unlock-btn');
        const lockScreen = document.getElementById('lock-screen');
        const dashScreen = document.getElementById('dashboard-screen');
        const errorMsg = document.getElementById('error-msg');

        function checkPin() {
            if (pinInput.value === EXPECTED_PIN) {
                lockScreen.classList.add('hidden');
                dashScreen.classList.remove('hidden');
            } else {
                errorMsg.style.display = 'block';
                pinInput.value = '';
                setTimeout(() => { errorMsg.style.display = 'none'; }, 2000);
            }
        }

        unlockBtn.addEventListener('click', checkPin);
        pinInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPin();
        });
    </script>
</body>
</html>
